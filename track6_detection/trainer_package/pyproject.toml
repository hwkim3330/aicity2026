[project]
name = "track6-cross-city-detector"
version = "0.1.0"
description = "AI City Challenge 2026 Track 6 trainer package (Hafnia TaaS)"
requires-python = ">=3.10"
dependencies = [
    "ultralytics==8.3.40",
    "torch>=2.2,<2.6",
    "torchvision>=0.17,<0.21",
    "opencv-python-headless==4.10.0.84",
    "PyYAML==6.0.2",
    "numpy<2.0",
    "pandas==2.2.3",
    "pillow>=11.1.0",
    "tqdm==4.67.1",
    "hafnia",
    # RF-DETR: leaderboard-confirmed choice (top 3 Track 6 teams all run
    # RF-DETR variants, not YOLO -- see scripts/train_rfdetr.py).
    "rfdetr[train,loggers]",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

# scripts/train.py imports `src.class_balance` etc., so ship `src` itself as
# the package (hatchling otherwise fails: it can't infer a package matching
# the project name).
[tool.hatch.build.targets.wheel]
packages = ["src"]

# NOTE: uv.lock is intentionally not hand-written here -- it must be
# generated by actually running `uv lock` (or `uv sync`) with the real
# `hafnia` package resolvable, which requires network access to PyPI in
# an environment that has it configured. Run:
#   uv lock
# from this directory before zipping the trainer package, so Hafnia's
# `uv sync --locked` build step has a real, reproducible lockfile.
